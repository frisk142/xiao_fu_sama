<!DOCTYPE html>
<html>
<head>
  <meta charset = "utf-8">
  <title>小芙酱.桌宠</title>
  <link rel = "stylesheet" type = "text/css" href = "waifu/waifu.css"/>
  <style>
    body{
    margin: 0;
    overflow: hidden;
    background-color: transparent;
    }

    /* 自定义输入框区域 */
    .input-area{
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 30px;
    padding: 6px 12px;
    display: flex;
    gap: 8px;
    z-index: 1000;
    }

    #input-text{
    width: 180px;
    padding: 5px 12px;
    border-radius: 20px;
    border: none;
    font-size: 13px;
    }

    #send-btn{
    background: #ff8da1;
    border: none;
    border-radius: 20px;
    padding: 5px 15px;
    color: white;
    cursor: pointer;
    }
  </style>
</head>
<body>
    <!-- live2D-widget 会在这里生成看板娘 -->
    <div class = "input-area">
      <input type = "text" id = "input-text" placeholder = "说点什么？...">
      <button id = "send-btn">发送</button>
    </div>

    <script src = "https://cdn.jsdelivr.net/npm/jquery@3.1/dist/jquery.min.js"></script>
    <script src = "https://cdn.jsdelivr.net/npm/jquery-ui@1.12.1/jquery-ui.min.js"></script>
    <script src = "waifu/waifu.js"></script>
    <script>
        //等待live2D-widget初始化完成（延时）
        setTimeout(() => {
        console.log("小芙已上线");

        // 默认显示一条欢迎语句

        if(window.loadlive2d){
          if (typeof window.showMessage === "function") {
            window.showMessage("主人我准备好啦",5000);
          }
        }
    },1000);
    </script>
</body>
</html>
