<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>小芙酱</title>
    <style>

        /* 页面整体 */
        body {
            margin: 0;
            overflow: hidden;
            background-color: transparent;
        }

        /* 自定义输入框区域 */
        .input-area {
            position: fixed;
            bottom: 5px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 6px 12px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        /* 输入框 */
        #input-text {
            width: 180px;
            padding: 5px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
            font-size: 13px;
        }

        /* 发送按钮 */
        #send-btn {
            background: #ff8da1;
            border: none;
            border-radius: 20px;
            padding: 5px 15px;
            color: white;
            cursor: pointer;
        }

        /* 小芙回答框 */
        #reply-box {
        background: rgba(255,248,205,0.8);
        width: 300px;
        height: 80px;
        border: none;
        outline: none;
        font-size: 15px;
        border-radius: 15px;
        padding: 10px;
        word-wrap: break-word;
        position: fixed;
        top: 270px;
        }

        /* 隐藏看板娘自带的整个对话框容器 */
        #waifu-tips {
            display: none !important;
            }
    </style>
</head>
<body>
    <div class="input-area">
        <input type="text" id="input-text" placeholder="说点什么？...">
        <button id="send-btn">发送</button>
    </div>

    <div id="reply-box">
    </div>

    <!-- 用于与 Python 通信的 Qt WebChannel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <!-- 加载依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.12.1/jquery-ui.min.js"></script>

    <!-- 加载 live2d-widget（会自动拉取模型和样式） -->
    <script src="https://fastly.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/autoload.js"></script>
    <script>
        // 全局 bridge 对象
        let bridge = null; // 初始化为null

        // 连接 WebChannel
        window.addEventListener('load', () => {
            if (typeof qt !== 'undefined' && qt.webChannelTransport) {
                new QWebChannel(qt.webChannelTransport, (channel) => {
                    bridge = channel.objects.bridge; // python的通信桥
                    console.log("WebChannel 已连接");
                    // 连接成功后显示欢迎语（选择调用新创建的文本框）
                    setTimeout(() => {
                        if (typeof document.getElementById === 'function') {
                            document.getElementById("reply-box").innerText = "✨ 小芙酱：主人，我准备好啦～" ;
                        }
                    }, 1500);
                });
            } else {
                console.warn("非 Qt 环境，通信功能不可用");
            }
        });

        // 发送消息按钮
        document.getElementById('send-btn').addEventListener('click', () => {
            const input = document.getElementById('input-text');
            const text = input.value.trim();
            if (text === "") return;
            if (bridge && bridge.sendToPython) {
                bridge.sendToPython(text);
                input.value = "";
                if (typeof document.getElementById === 'function') {
                    document.getElementById("reply-box").innerText = "✨ 小芙酱：思考中...";
                }
            } else {
                console.warn("bridge 未就绪");
                alert("小芙酱还没连上，稍等片刻～");
            }
        });

        // 回车发送
        document.getElementById('input-text').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send-btn').click();
        });








    </script>
</body>
</html>
