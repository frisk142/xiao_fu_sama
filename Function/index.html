<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>小芙酱</title>
    <style>

        *,*::before,*::after {  /* 全局重置 */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面整体 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            pointer-events: none; /* 实现窗口整体穿透，确保空白区域可以整体穿透，再给每个元素组件设置单独的 pointer-events 来实现部分交互 */
        }

        /* 自定义输入框区域 */
        .input-area {
            pointer-events: auto;
            position: fixed;
            top: 380px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 30px;
            padding: 6px 12px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        /* 输入框 */
        #input-text {
            pointer-events: auto;
            top: 100px;
            width: 180px;
            padding: 5px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
            font-size: 13px;
        }

        /* 发送按钮 */
        #send-btn {
            pointer-events: auto;
            top: 100px;
            background: #ff8da1;
            border: none;
            border-radius: 20px;
            padding: 5px 15px;
            color: white;
            cursor: pointer;
        }

        /* 小芙回答框 */
        #reply-box {
            pointer-events: auto;
            display: block; 
            background: rgba(255,248,205,0.8);
            width: 320px;
            height: 150px;
            border: none;
            outline: none;
            font-size: 15px;
            border-radius: 15px;
            padding: 10px;
            word-wrap: break-word;
            position: fixed;
            top: 0px;
            overflow-y: auto;
            word-wrap: break-word;
            scrollbar-width: none; 
            -ms-overflow-style: none;
    }

        /* reply-box开关 */
        #reply_switch{
            pointer-events: auto;
            background: rgba(0,0,0,0);
            position: absolute;
            top: 0px;
            font-size: 16px;
            z-index: 1000;
            width: 23px;
            height: 23px;
            right: 180px;
            border: none;
        }

        #waifu,.waifu{
            position: fixed;
            top: 90px;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            z-index: 0;
        }
        canvas{
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
    
        /*隐藏滚动条*/
        #reply-box::-webkit-scrollbar {
            display: none;
        }

        /* 隐藏看板娘自带的整个对话框容器 */
        #waifu-tips {
            display: none !important;
        }

    </style>

</head>
<body>

    <div class="input-area">
        <input type="text" id="input-text" placeholder="说点什么？...">
        <button id="send-btn">发送</button>
    </div>

    <div id="reply-box">
    </div>
    <button id  = "reply_switch">❌</button>

    <!--用于处理关闭对话框的判断逻辑-->
    <script>
    const closeBtn = document.getElementById('reply_switch');
    const replyBox = document.getElementById('reply-box');
    replyBox.style.display = "block";
    closeBtn.textContent = "❌"
    if (closeBtn && replyBox) {
        closeBtn.addEventListener("click", function() {
            const isHidden = replyBox.style.display === "none";
            replyBox.style.display = isHidden ? "block" : "none";
            closeBtn.textContent = isHidden ? "❌" : "💬";
    }
  );
}
    </script>


    

    <!-- 用于与 Python 通信的 Qt WebChannel -->
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>

    <!-- 加载依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.1/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.12.1/jquery-ui.min.js"></script>

    <!-- 加载 live2d-widget（会自动拉取模型和样式） -->
    <script src="https://fastly.jsdelivr.net/gh/stevenjoezhang/live2d-widget@latest/autoload.js"></script>
    <script>
        // 全局 bridge 对象
        let bridge = null; // 初始化为null

        // 连接 WebChannel
        window.addEventListener('load', () => {
            if (typeof qt !== 'undefined' && qt.webChannelTransport) {
                new QWebChannel(qt.webChannelTransport, (channel) => {
                    bridge = channel.objects.bridge; // python的通信桥
                    console.log("WebChannel 已连接");
                    // 连接成功后显示欢迎语（选择调用新创建的文本框）
                    setTimeout(() => {
                        if (typeof document.getElementById === 'function') {
                            document.getElementById("reply-box").innerText = "✨ 小芙酱：主人，我准备好啦～" ;
                        }
                    }, 1500);
                });
            } else {
                console.warn("非 Qt 环境，通信功能不可用");
            }
        });

        // 发送消息按钮
        document.getElementById('send-btn').addEventListener('click', () => {
            const input = document.getElementById('input-text');
            const text = input.value.trim();
            if (text === "") return;
            if (bridge && bridge.sendToPython) {
                bridge.sendToPython(text);
                input.value = "";
                if (typeof document.getElementById === 'function') {
                    document.getElementById("reply-box").innerText = "✨ 小芙酱：思考中...";
                }
            } else {
                console.warn("bridge 未就绪");
                alert("小芙酱还没连上，稍等片刻～");
            }
        });

        // 回车发送
        document.getElementById('input-text').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('send-btn').click()
;
        });


    </script>
</body>
</html>
